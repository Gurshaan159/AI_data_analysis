name: AI Bounded Planner Checks

on:
  pull_request:

jobs:
  ai-bounded-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run AI bounded planner tests
        run: npm run test:ai
